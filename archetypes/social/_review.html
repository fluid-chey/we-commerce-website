<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 19 — Archetype Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; padding: 40px; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 32px; }
  .grid { display: flex; flex-direction: column; gap: 40px; }
  .card { display: grid; grid-template-columns: 1080fr 1fr; gap: 24px; align-items: start; }
  .card-left { display: flex; flex-direction: column; gap: 8px; }
  .card-label { font-size: 14px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .frame-wrap {
    width: 540px; height: 540px;
    border: 1px solid #d0d0d0;
    background: #f5f5f5;
    overflow: hidden;
    position: relative;
  }
  .frame-wrap iframe {
    width: 1080px; height: 1080px;
    transform: scale(0.5);
    transform-origin: top left;
    border: none;
    display: block;
  }
  .card-right { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 320px; }
  .card-right label { font-size: 13px; font-weight: 500; color: #777; }
  .card-right textarea {
    width: 100%; min-height: 140px; padding: 12px;
    border: 1px solid #d0d0d0; border-radius: 6px;
    font-family: inherit; font-size: 14px; line-height: 1.5;
    resize: vertical; background: #fafafa;
  }
  .card-right textarea:focus { outline: none; border-color: #888; background: #fff; }
  .status { font-size: 12px; color: #999; margin-top: 2px; }
  .actions { display: flex; gap: 12px; margin-top: 16px; align-items: center; }
  button {
    padding: 10px 20px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 6px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy { background: #1a1a1a; color: #fff; }
  .btn-copy:hover { background: #333; }
  .btn-approve { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .btn-approve:hover { background: #c8e6c9; }
  .toast {
    display: inline-block; font-size: 13px; color: #2e7d32; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Phase 19 — Archetype Review</h1>

<div class="grid" id="grid"></div>

<div class="actions">
  <button class="btn-copy" onclick="copyAll()">Copy All Feedback</button>
  <button class="btn-approve" onclick="copyApproved()">Copy "approved"</button>
  <span class="toast" id="toast">Copied to clipboard</span>
</div>

<script>
const archetypes = [
  { slug: 'stat-hero-single', label: 'Stat Hero Single (Phase 18 PoC)', desc: 'Original PoC — giant stat, headline, subtext, 68px margins' },
  { slug: 'hero-stat', label: 'Hero Stat', desc: 'Eyebrow + headline + body copy, 3-stat row at bottom' },
  { slug: 'hero-stat-split', label: 'Hero Stat Split (NEW)', desc: 'Photo left, headline + body + 2 stats right' },
  { slug: 'photo-bg-overlay', label: 'Photo BG Overlay', desc: 'Full-bleed photo with gradient text overlay' },
  { slug: 'split-photo-text', label: 'Split Photo / Text', desc: '50/50 split — photo left, headline + body right' },
  { slug: 'split-photo-quote', label: 'Split Photo / Quote (NEW)', desc: '50/50 split — photo left, pull quote + attribution right' },
  { slug: 'quote-testimonial', label: 'Quote Testimonial', desc: 'Full-width pull quote, portrait + attribution row' },
  { slug: 'minimal-statement', label: 'Minimal Statement', desc: 'Bold statement + subheader, grouped tight' },
  { slug: 'minimal-photo-top', label: 'Minimal Photo Top (NEW)', desc: 'Photo top half, headline + subheader bottom' },
  { slug: 'data-dashboard', label: 'Data Dashboard', desc: '2x2 stat grid, centered headline' },
];

const grid = document.getElementById('grid');

archetypes.forEach(a => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-left">
      <div class="card-label">${a.label}</div>
      <div class="status">${a.desc}</div>
      <div class="frame-wrap">
        <iframe src="${a.slug}/index.html" loading="lazy"></iframe>
      </div>
    </div>
    <div class="card-right">
      <label for="fb-${a.slug}">Feedback</label>
      <textarea id="fb-${a.slug}" placeholder="approved / issues..."></textarea>
    </div>
  `;
  grid.appendChild(card);
});

function gatherMarkdown() {
  let md = '## Archetype Visual Review\n\n';
  let hasAny = false;
  archetypes.forEach(a => {
    const val = document.getElementById('fb-' + a.slug).value.trim();
    if (val) {
      hasAny = true;
      md += `### ${a.label} (\`${a.slug}\`)\n${val}\n\n`;
    }
  });
  if (!hasAny) return null;
  return md.trim();
}

function flash() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyAll() {
  const md = gatherMarkdown();
  if (!md) { alert('No feedback entered yet.'); return; }
  navigator.clipboard.writeText(md).then(flash);
}

function copyApproved() {
  navigator.clipboard.writeText('approved').then(flash);
}
</script>

</body>
</html>
